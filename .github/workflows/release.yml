name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wasteland-2-editor-linux-amd64
            build_cmd: go build -o wasteland-2-editor-linux-amd64 ./cmd/wasteland-2-editor
          - os: windows-latest
            artifact: wasteland-2-editor-windows-amd64.exe
            build_cmd: go build -o wasteland-2-editor-windows-amd64.exe ./cmd/wasteland-2-editor
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Test
        run: go test ./...

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
